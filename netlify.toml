[build]
  command = "npm run build"
  publish = "dist/public"
  functions = "netlify/functions"  # Update this to your functions directory if different

[build.environment]
  NODE_VERSION = "20"
  NPM_FLAGS = "--version"  # Ensure npm is used

# Single Page App (SPA) support - redirect all routes to index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# API proxy - if you're using API routes
[[redirects]]
  from = "/api/*"
  to = "https://your-render-backend-url.ondigitalocean.app/:splat"  # Replace with your Render backend URL
  status = 200

# Cache static assets for 1 year
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https:; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self' https://your-render-backend-url.ondigitalocean.app;"  # Update with your backend URL
