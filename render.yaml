services:
  - type: web
    name: wastewise-manager
    env: node
    buildCommand: |
      # Install root dependencies
      npm install
      
      # Build server first
      npm run build:server
      
      # Then build client
      cd client
      npm install
      npm run build
      cd ..
      
      # Ensure dist directory exists
      mkdir -p dist/client
      
      # Copy client build to dist
      cp -r client/dist/* dist/client/
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      # Add other environment variables from your .env file here
      # - key: DATABASE_URL
      #   fromDatabase:
      #     name: your-db-name
      #     property: connectionString
    plan: free
